<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хрустальный дневник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0b0b12;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #eaeef2;
            height: 100vh;
            overflow: hidden;
            touch-action: pan-x pan-y;
        }

        /* --- космический фон --- */
        #space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #131b2b, #07080e);
            z-index: 0;
            pointer-events: none;
        }
        #space-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 80%, rgba(60, 110, 180, 0.08), transparent 60%),
                        radial-gradient(circle at 20% 20%, rgba(200, 180, 255, 0.05), transparent 50%);
            pointer-events: none;
        }

        /* --- главный контейнер (слой календаря + холст) --- */
        #app {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 12px 0;
            max-width: 460px;
            margin: 0 auto;
        }

        /* --- календарь (главный экран) --- */
        #calendar-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(6px);
            background: rgba(12, 16, 28, 0.55);
            border-radius: 32px;
            padding: 16px 12px 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: opacity 0.3s ease;
            overflow: hidden;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 0 6px;
        }
        .cal-header .month-year {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #d6deea;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }
        .cal-header .stats {
            display: flex;
            gap: 14px;
            font-size: 15px;
            background: rgba(0,0,0,0.3);
            padding: 6px 14px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .cal-header .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cal-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .cal-nav button {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #bcc9e0;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .cal-nav button:active { background: rgba(255,255,255,0.15); }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 12px;
            color: #7c8aa8;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
            padding: 0 2px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            flex: 1;
            align-content: start;
            padding: 2px 0;
        }

        .day-cell {
            aspect-ratio: 1/1;
            background: rgba(255,255,255,0.02);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 400;
            color: #b8c7e0;
            transition: 0.15s;
            position: relative;
            border: 1px solid transparent;
            cursor: default;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            min-height: 44px;
        }
        .day-cell.today {
            border-color: #5f8aff;
            box-shadow: 0 0 16px #3f6eff66;
        }
        .day-cell .mini-waves {
            display: flex;
            gap: 3px;
            margin-top: 2px;
            height: 8px;
            align-items: flex-end;
        }
        .day-cell .mini-waves span {
            width: 4px;
            height: 6px;
            border-radius: 4px;
            background: #4f6a9e;
            opacity: 0.5;
        }
        .day-cell .star-icon {
            position: absolute;
            top: 2px;
            right: 5px;
            font-size: 12px;
            color: #f6d06b;
            text-shadow: 0 0 12px #f6b83d;
        }
        .day-cell .audio-icon {
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 10px;
            color: #8ab3ff;
        }
        .day-cell.empty { background: transparent; box-shadow: none; }

        /* --- холст (оценка дня) --- */
        #canvas-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(6, 8, 18, 0.85);
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            padding: 20px 16px 20px;
            border-radius: 0;
            overflow-y: auto;
            transition: opacity 0.25s;
        }
        #canvas-view.open {
            display: flex;
        }

        .canvas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .canvas-header .date-badge {
            font-size: 20px;
            font-weight: 500;
            background: rgba(255,255,255,0.04);
            padding: 6px 20px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .canvas-header .close-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: #b0c4e8;
            font-size: 28px;
            padding: 0 14px;
            border-radius: 30px;
            cursor: pointer;
        }

        .rating-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 8px 0 16px;
        }
        .rating-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
            color: #c8d6f0;
            font-size: 22px;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
        }
        .rating-btn.selected {
            border-color: #aac3ff;
            box-shadow: 0 0 24px #4f7eff66;
            background: rgba(80, 140, 255, 0.15);
        }

        .states-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 10px 0 8px;
        }
        .state-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 14px;
            border-radius: 40px;
            color: #c8daf0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
            transition: 0.15s;
            cursor: pointer;
        }
        .state-btn.active {
            background: rgba(100, 180, 255, 0.15);
            border-color: #6a9eff;
            box-shadow: 0 0 18px #3f7eff44;
        }

        .comment-area {
            margin: 12px 0 10px;
            background: rgba(0,0,0,0.25);
            border-radius: 24px;
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .comment-area textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #dde6f5;
            font-size: 15px;
            resize: none;
            outline: none;
            min-height: 56px;
            font-family: inherit;
        }

        .star-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0 10px;
            flex-wrap: wrap;
        }
        .star-btn {
            background: rgba(255,215,0,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            padding: 6px 20px;
            border-radius: 40px;
            color: #f5d76e;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .star-btn:active { background: rgba(255,215,0,0.2); }

        .audio-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 6px 0 10px;
        }
        .audio-controls button {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 16px;
            border-radius: 30px;
            color: #b4c8ec;
            font-size: 14px;
            cursor: pointer;
        }

        .save-day-btn {
            background: linear-gradient(135deg, #3a6eff, #6f4eff);
            border: none;
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 18px;
            margin-top: 12px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(60, 100, 255, 0.3);
            transition: 0.2s;
        }
        .save-day-btn:active { opacity: 0.7; transform: scale(0.97); }

        /* --- волны на холсте (имитация) --- */
        .wave-preview {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 4px 0 12px;
            min-height: 28px;
        }
        .wave-chip {
            background: rgba(100, 200, 255, 0.08);
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid rgba(100, 200, 255, 0.15);
            font-size: 14px;
            color: #b0d0f5;
        }

        /* --- адаптив --- */
        @media (max-width: 400px) {
            .rating-btn { width: 44px; height: 44px; font-size: 18px; }
            .day-cell { font-size: 13px; min-height: 38px; }
        }

        /* утилиты */
        .hidden { display: none !important; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .gap-2 { gap: 8px; }

        /* звуковой индикатор */
        .sound-indicator {
            font-size: 12px;
            color: #7a8bb0;
            padding: 4px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <div id="space-bg"></div>
    <div id="app">

        <!-- КАЛЕНДАРЬ -->
        <div id="calendar-view">
            <div class="cal-header">
                <div class="month-year" id="monthYear">Март 2026</div>
                <div class="stats">
                    <span>⭐ <span id="avgScore">—</span></span>
                    <span>🔥 <span id="streakCount">0</span></span>
                </div>
            </div>
            <div class="cal-nav">
                <button id="prevMonth">‹</button>
                <button id="nextMonth">›</button>
            </div>
            <div class="weekdays">
                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
            </div>
            <div class="days-grid" id="daysGrid"></div>
            <div style="text-align:center;font-size:12px;color:#5a6f92;padding-top:6px;">✦ долгое нажатие на день — редактировать</div>
        </div>

        <!-- ХОЛСТ (оценка дня) -->
        <div id="canvas-view">
            <div class="canvas-header">
                <div class="date-badge" id="canvasDate">12 мар 2026</div>
                <button class="close-btn" id="closeCanvas">✕</button>
            </div>

            <div class="rating-row" id="ratingRow">
                <button class="rating-btn" data-val="1">1</button>
                <button class="rating-btn" data-val="2">2</button>
                <button class="rating-btn" data-val="3">3</button>
                <button class="rating-btn" data-val="4">4</button>
                <button class="rating-btn" data-val="5">5</button>
            </div>

            <div class="wave-preview" id="wavePreview"></div>

            <div class="states-grid" id="statesGrid">
                <button class="state-btn" data-state="Поток">🌊 Поток</button>
                <button class="state-btn" data-state="Свет">☀️ Свет</button>
                <button class="state-btn" data-state="Уют">🏠 Уют</button>
                <button class="state-btn" data-state="Тень">🌙 Тень</button>
                <button class="state-btn" data-state="Искра">⚡ Искра</button>
                <button class="state-btn" data-state="Тишина">🌿 Тишина</button>
                <button class="state-btn" data-state="Туман">🌫️ Туман</button>
            </div>

            <div class="comment-area">
                <textarea id="dayComment" placeholder="Заметка дня..."></textarea>
            </div>

            <div class="star-section">
                <button class="star-btn" id="addStarBtn">✦ Добавить звезду</button>
                <span style="font-size:14px;color:#9ab0d8;" id="starCountDisplay">⭐ 0</span>
                <span class="sound-indicator">🔊 фон</span>
            </div>

            <div class="audio-controls">
                <button id="musicBtn">🎵 Добавить музыку</button>
                <button id="clearAudioBtn">✕ Убрать аудио</button>
            </div>

            <button class="save-day-btn" id="saveDayBtn">💎 Сохранить день</button>
        </div>
    </div>

    <script>
        (function(){
            // ---- DATA LAYER ----
            const STORAGE_KEY = 'crystal_diary_data';
            let diaryData = {};

            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) diaryData = JSON.parse(raw);
                    else diaryData = {};
                } catch(e) { diaryData = {}; }
            }
            function saveData() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(diaryData));
            }

            // ---- STATE ----
            let currentDate = new Date();
            let currentYear = currentDate.getFullYear();
            let currentMonth = currentDate.getMonth();
            let selectedDay = null; // { year, month, day }

            // для холста
            let canvasRating = 0;
            let canvasStates = [];
            let canvasComment = '';
            let canvasStars = 0;
            let canvasAudio = null; // просто строка-метка

            // DOM
            const daysGrid = document.getElementById('daysGrid');
            const monthYear = document.getElementById('monthYear');
            const avgScore = document.getElementById('avgScore');
            const streakCount = document.getElementById('streakCount');
            const canvasView = document.getElementById('canvas-view');
            const canvasDate = document.getElementById('canvasDate');
            const ratingRow = document.getElementById('ratingRow');
            const statesGrid = document.getElementById('statesGrid');
            const wavePreview = document.getElementById('wavePreview');
            const dayComment = document.getElementById('dayComment');
            const starCountDisplay = document.getElementById('starCountDisplay');
            const addStarBtn = document.getElementById('addStarBtn');
            const saveDayBtn = document.getElementById('saveDayBtn');
            const closeCanvasBtn = document.getElementById('closeCanvas');
            const musicBtn = document.getElementById('musicBtn');
            const clearAudioBtn = document.getElementById('clearAudioBtn');

            // ---- helpers ----
            function getDayKey(year, month, day) { return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`; }

            function getDayData(year, month, day) {
                const key = getDayKey(year, month, day);
                return diaryData[key] || null;
            }

            function setDayData(year, month, day, data) {
                const key = getDayKey(year, month, day);
                diaryData[key] = data;
                saveData();
            }

            function getMonthData(year, month) {
                const result = {};
                const daysInMonth = new Date(year, month+1, 0).getDate();
                for (let d=1; d<=daysInMonth; d++) {
                    const key = getDayKey(year, month, d);
                    if (diaryData[key]) result[d] = diaryData[key];
                }
                return result;
            }

            // ---- рендер календаря ----
            function renderCalendar() {
                const year = currentYear, month = currentMonth;
                const firstDay = new Date(year, month, 1).getDay(); // 0=вск
                const daysInMonth = new Date(year, month+1, 0).getDate();
                const today = new Date();
                const todayYear = today.getFullYear(), todayMonth = today.getMonth(), todayDay = today.getDate();

                let html = '';
                // пустые ячейки до первого дня (пн=0)
                let startOffset = (firstDay === 0) ? 6 : firstDay - 1;
                for (let i=0; i<startOffset; i++) {
                    html += `<div class="day-cell empty"></div>`;
                }

                const monthData = getMonthData(year, month);
                let totalScore = 0, countScore = 0, streak = 0;

                for (let d=1; d<=daysInMonth; d++) {
                    const data = monthData[d];
                    let rating = data?.rating || 0;
                    let states = data?.states || [];
                    let hasStar = data?.stars > 0;
                    let hasAudio = data?.audio ? true : false;
                    let isToday = (year === todayYear && month === todayMonth && d === todayDay);

                    // цвет шкалы
                    let bgColor = 'transparent';
                    if (rating === 1) bgColor = '#1a1a24';
                    else if (rating === 2) bgColor = '#2d2f3a';
                    else if (rating === 3) bgColor = '#44485a';
                    else if (rating === 4) bgColor = '#6a6f84';
                    else if (rating === 5) bgColor = '#b0b8d0';

                    if (rating > 0) totalScore += rating, countScore++;

                    // стрик (простой подсчёт)
                    if (isToday || (data && data.rating > 0)) streak++;

                    html += `<div class="day-cell ${isToday ? 'today' : ''}" style="background:${bgColor};" data-day="${d}">`;
                    html += `<span>${d}</span>`;
                    if (states.length > 0) {
                        html += `<div class="mini-waves">`;
                        states.slice(0,3).forEach(s => {
                            const color = ['#7ab0ff','#6fcf97','#f2c94a','#bb6bd9','#ff8a8a','#7fdbff','#b0b0b0'][Math.floor(Math.random()*7)];
                            html += `<span style="background:${color};"></span>`;
                        });
                        html += `</div>`;
                    }
                    if (hasStar) html += `<div class="star-icon">✦</div>`;
                    if (hasAudio) html += `<div class="audio-icon">🎵</div>`;
                    html += `</div>`;
                }

                daysGrid.innerHTML = html;
                monthYear.textContent = `${new Date(year, month).toLocaleString('ru', {month:'long', year:'numeric'})}`;
                avgScore.textContent = countScore > 0 ? (totalScore/countScore).toFixed(1) : '—';
                streakCount.textContent = streak;

                // обработка кликов по дням
                document.querySelectorAll('.day-cell:not(.empty)').forEach(el => {
                    el.addEventListener('click', function(e) {
                        const day = parseInt(this.dataset.day);
                        openDayEditor(year, month, day);
                    });
                    // долгое нажатие для редактирования (уже открывает)
                });
            }

            // ---- открыть холст ----
            function openDayEditor(year, month, day) {
                selectedDay = { year, month, day };
                const data = getDayData(year, month, day) || {};
                canvasRating = data.rating || 0;
                canvasStates = data.states || [];
                canvasComment = data.comment || '';
                canvasStars = data.stars || 0;
                canvasAudio = data.audio || null;

                canvasDate.textContent = `${day} ${new Date(year, month).toLocaleString('ru', {month:'short'})} ${year}`;

                // обновить UI
                updateCanvasUI();
                canvasView.classList.add('open');
            }

            function updateCanvasUI() {
                // рейтинг
                document.querySelectorAll('.rating-btn').forEach(btn => {
                    const val = parseInt(btn.dataset.val);
                    btn.classList.toggle('selected', val === canvasRating);
                });
                // состояния
                document.querySelectorAll('.state-btn').forEach(btn => {
                    const state = btn.dataset.state;
                    btn.classList.toggle('active', canvasStates.includes(state));
                });
                // комментарий
                dayComment.value = canvasComment;
                // звёзды
                starCountDisplay.textContent = `⭐ ${canvasStars}`;
                // волны
                wavePreview.innerHTML = canvasStates.map(s => `<span class="wave-chip">${s}</span>`).join('');
            }

            // ---- сохранение дня ----
            function saveCurrentDay() {
                if (!selectedDay) return;
                const { year, month, day } = selectedDay;
                const data = {
                    rating: canvasRating,
                    states: canvasStates,
                    comment: canvasComment,
                    stars: canvasStars,
                    audio: canvasAudio
                };
                setDayData(year, month, day, data);
                renderCalendar();
                canvasView.classList.remove('open');
            }

            // ---- события UI ----
            // рейтинг
            ratingRow.addEventListener('click', (e) => {
                const btn = e.target.closest('.rating-btn');
                if (!btn) return;
                canvasRating = parseInt(btn.dataset.val);
                updateCanvasUI();
            });

            // состояния (макс 4)
            statesGrid.addEventListener('click', (e) => {
                const btn = e.target.closest('.state-btn');
                if (!btn) return;
                const state = btn.dataset.state;
                if (canvasStates.includes(state)) {
                    canvasStates = canvasStates.filter(s => s !== state);
                } else {
                    if (canvasStates.length >= 4) return;
                    canvasStates.push(state);
                }
                updateCanvasUI();
            });

            // комментарий
            dayComment.addEventListener('input', () => {
                canvasComment = dayComment.value;
            });

            // звезда
            addStarBtn.addEventListener('click', () => {
                if (canvasStars >= 7) return;
                canvasStars++;
                updateCanvasUI();
                // имитация звука + анимация (просто вибрация)
                if (navigator.vibrate) navigator.vibrate(30);
            });

            // аудио (имитация)
            musicBtn.addEventListener('click', () => {
                canvasAudio = '🎵 Трек (Яндекс/загрузка)';
                updateCanvasUI();
            });
            clearAudioBtn.addEventListener('click', () => {
                canvasAudio = null;
                updateCanvasUI();
            });

            // сохранить
            saveDayBtn.addEventListener('click', saveCurrentDay);

            // закрыть
            closeCanvasBtn.addEventListener('click', () => {
                canvasView.classList.remove('open');
            });

            // навигация
            document.getElementById('prevMonth').addEventListener('click', () => {
                currentMonth--;
                if (currentMonth < 0) { currentMonth = 11; currentYear--; }
                renderCalendar();
            });
            document.getElementById('nextMonth').addEventListener('click', () => {
                currentMonth++;
                if (currentMonth > 11) { currentMonth = 0; currentYear++; }
                renderCalendar();
            });

            // ---- инициализация ----
            loadData();
            renderCalendar();

            // если сегодня нет данных — можно открыть сегодняшний день (опционально)
            // но по концепту пользователь сам выбирает день

            // звуковой фон (имитация) — просто индикатор
