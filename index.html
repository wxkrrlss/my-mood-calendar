<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Реалистичный дневник</title>
    <style>
        /* ... стили такие же, как в предыдущей версии, но с небольшими правками ... */
        /* Я добавил в .state-descriptions z-index: 1003, position: fixed, center, opacity: 0.5, font-size: 12px */
        /* И убрал лишние стили */
        /* В коде ниже все стили будут включены */
    </style>
</head>
<body>
    <!-- HTML-структура аналогична предыдущей, но я добавил отдельный слой для подписей дополнений -->
    <div id="app">
        <div class="calendar-wrapper"> ... </div>
        <canvas id="bgCanvas"></canvas>
        <div id="waveContainer">
            <div class="fog-overlay" id="fogOverlay"></div>
            <!-- ... -->
            <div class="state-descriptions" id="stateDescriptions">
                <!-- Здесь будут отображаться выбранные состояния -->
            </div>
            <!-- ... -->
        </div>
    </div>

    <script>
        // =================================================================
        // 1. КОНСТАНТЫ
        // =================================================================
        const STATES = [
            { id: 'поток', label: '🌊 Поток', color: '#4dd0e1', desc: 'день прошёл на одном дыхании' },
            { id: 'свет', label: '☀️ Свет', color: '#ffca28', desc: 'день был тёплым и радостным' },
            { id: 'уют', label: '🏠 Уют', color: '#ffab91', desc: 'чувствовала себя в безопасности' },
            { id: 'тень', label: '🌙 Тень', color: '#90caf9', desc: 'день был тяжёлым или грустным' },
            { id: 'искра', label: '⚡ Искра', color: '#ce93d8', desc: 'случилось что-то яркое и неожиданное' },
            { id: 'тишина', label: '🌿 Тишина', color: '#81c784', desc: 'спокойный, но не пустой день' },
            { id: 'туман', label: '🌫️ Туман', color: '#b0bec5', desc: 'день прошёл как в дымке' }
        ];

        // =================================================================
        // 2. ДАННЫЕ
        // =================================================================
        let moodData = {};
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        let currentDateStr = null;
        let selectedStates = [];
        let stars = [];
        let canvas, ctx, animationId;
        let selectedMood = 0;
        const MAX_STARS = 7;
        let isResetInProgress = false;
        let waveStates = {};

        // =================================================================
        // 3. ЗВУКИ (продолжительные)
        // =================================================================
        let audioCtx = null;
        let bgGainNode = null;
        let bgOscillator = null;
        let bgNoiseNode = null;
        let bgFilter = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        }

        function createRainSound() {
            try {
                initAudio();
                const bufferSize = audioCtx.sampleRate * 4;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.15 * (1 - i / bufferSize);
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                noise.loop = true;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 800;

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                noise.start();
                return { source: noise, gain: gain, filter: filter };
            } catch (e) { return null; }
        }

        function createWindSound() {
            try {
                initAudio();
                const bufferSize = audioCtx.sampleRate * 4;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.08 * (1 - i / bufferSize);
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                noise.loop = true;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 300;

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                noise.start();
                return { source: noise, gain: gain, filter: filter };
            } catch (e) { return null; }
        }

        function createFlowerRustle() {
            try {
                initAudio();
                // Шуршание — используем шум с быстрой модуляцией
                const bufferSize = audioCtx.sampleRate * 3;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.04 * (1 - i / bufferSize);
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                noise.loop = true;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 600;
                filter.Q.value = 0.5;

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                noise.start();
                return { source: noise, gain: gain, filter: filter };
            } catch (e) { return null; }
        }

        function createHeavenlyTone() {
            try {
                initAudio();
                // Несколько синусоид с мягким звучанием
                const osc1 = audioCtx.createOscillator();
                osc1.type = 'sine';
                osc1.frequency.value = 440;

                const osc2 = audioCtx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.value = 550;

                const osc3 = audioCtx.createOscillator();
                osc3.type = 'sine';
                osc3.frequency.value = 660;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);

                const gain2 = audioCtx.createGain();
                gain2.gain.setValueAtTime(0.015, audioCtx.currentTime);

                const gain3 = audioCtx.createGain();
                gain3.gain.setValueAtTime(0.01, audioCtx.currentTime);

                osc1.connect(gain);
                osc2.connect(gain2);
                osc3.connect(gain3);
                gain.connect(audioCtx.destination);
                gain2.connect(audioCtx.destination);
                gain3.connect(audioCtx.destination);

                osc1.start();
                osc2.start();
                osc3.start();

                return {
                    sources: [osc1, osc2, osc3],
                    gains: [gain, gain2, gain3]
                };
            } catch (e) { return null; }
        }

        function createGlassCrystalSound() {
            // Звук битого стекла/хрусталя для звезды
            try {
                initAudio();
                const bufferSize = audioCtx.sampleRate * 0.5;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.15 * (1 - i / bufferSize);
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                noise.connect(gain);
                gain.connect(audioCtx.destination);
                noise.start();
                noise.stop(audioCtx.currentTime + 0.4);

                // Добавляем высокие тона
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 3000;
                const gain2 = audioCtx.createGain();
                gain2.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);

                return { noise: noise, osc: osc };
            } catch (e) { return null; }
        }

        // Управление фоновыми звуками
        let currentBgSound = null;

        function startBgSound(mood) {
            stopBgSound();
            if (mood === 0) return;
            let soundObj = null;
            switch (mood) {
                case 1:
                    soundObj = createRainSound();
                    break;
                case 2:
                    soundObj = createWindSound();
                    break;
                case 3:
                    soundObj = createWindSound(); // можно изменить позже
                    break;
                case 4:
                    soundObj = createFlowerRustle();
                    break;
                case 5:
                    soundObj = createHeavenlyTone();
                    break;
                default:
                    return;
            }
            if (soundObj) {
                currentBgSound = soundObj;
                // Сохраняем ссылки на gain для плавного затухания
                if (soundObj.gain) {
                    soundObj.gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                }
            }
        }

        function stopBgSound() {
            if (currentBgSound) {
                if (currentBgSound.source) {
                    try { currentBgSound.source.stop(); } catch (e) {}
                }
                if (currentBgSound.sources) {
                    currentBgSound.sources.forEach(s => { try { s.stop(); } catch (e) {} });
                }
                if (currentBgSound.noise) {
                    try { currentBgSound.noise.stop(); } catch (e) {}
                }
                if (currentBgSound.osc) {
                    try { currentBgSound.osc.stop(); } catch (e) {}
                }
                currentBgSound = null;
            }
        }

        function fadeBgSound(targetGain = 0.02, duration = 1.0) {
            if (currentBgSound && currentBgSound.gain) {
                currentBgSound.gain.gain.linearRampToValueAtTime(targetGain, audioCtx.currentTime + duration);
            }
            // Для heavenly tones у нас несколько gain нод
            if (currentBgSound && currentBgSound.gains) {
                currentBgSound.gains.forEach(g => {
                    g.gain.linearRampToValueAtTime(targetGain * 0.5, audioCtx.currentTime + duration);
                });
            }
        }

        // =================================================================
        // 4. РАБОТА С ДАННЫМИ
        // =================================================================
        function loadData() {
            try { const raw = localStorage.getItem('mood_diary_data');
                if (raw) moodData = JSON.parse(raw); } catch (e) { moodData = {}; }
        }
        function saveData() {
            try { localStorage.setItem('mood_diary_data', JSON.stringify(moodData)); } catch (e) {}
        }
        function getDayData(dateStr) {
            if (!moodData[dateStr]) moodData[dateStr] = { mood: 0, states: [], stars: [], note: '', stateNotes: {} };
            return moodData[dateStr];
        }
        function isToday(dateStr) {
            const today = new Date();
            const ts = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today
                .getDate()).padStart(2, '0');
            return dateStr === ts;
        }
        function isFuture(dateStr) {
            const today = new Date();
            const ts = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today
                .getDate()).padStart(2, '0');
            return dateStr > ts;
        }
        function getMonthAvg(year, month) {
            let total = 0,
                count = 0;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const data = getDayData(ds);
                if (data.mood > 0) { total += data.mood;
                    count++; }
            }
            return count > 0 ? (total / count).toFixed(1) : null;
        }

        // =================================================================
        // 5. КАЛЕНДАРЬ
        // =================================================================
        function renderMiniWaves(container, states) {
            container.innerHTML = '';
            if (!states || states.length === 0) return;
            const colors = states.map(id => {
                const st = STATES.find(s => s.id === id);
                return st ? st.color : '#888';
            });
            colors.forEach(color => {
                const wave = document.createElement('div');
                wave.className = 'mini-wave';
                wave.style.background = color;
                wave.style.boxShadow = `0 0 8px ${color}`;
                container.appendChild(wave);
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('daysGrid');
            if (!grid) {
                console.error('daysGrid not found');
                return;
            }
            const monthYear = document.getElementById('monthYear');
            const monthAvg = document.getElementById('monthAvg');
            const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь',
                'Ноябрь', 'Декабрь'
            ];
            monthYear.textContent = months[currentMonth] + ' ' + currentYear;
            const avg = getMonthAvg(currentYear, currentMonth);
            monthAvg.textContent = avg ? `★ ${avg}` : '';

            const firstDay = new Date(currentYear, currentMonth, 1);
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const startDay = firstDay.getDay() || 7;
            grid.innerHTML = '';

            for (let i = 1; i < startDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                grid.appendChild(empty);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const data = getDayData(dateStr);
                const mood = data.mood || 0;
                const dayEl = document.createElement('div');
                dayEl.className = `day mood-${mood}`;
                if (isToday(dateStr)) dayEl.classList.add('today');
                if (isFuture(dateStr)) dayEl.classList.add('future');

                const numSpan = document.createElement('span');
                numSpan.className = 'day-number';
                numSpan.textContent = d;
                dayEl.appendChild(numSpan);

                if (data.states && data.states.length > 0) {
                    const waveContainer = document.createElement('div');
                    waveContainer.className = 'day-wave-container';
                    renderMiniWaves(waveContainer, data.states);
                    dayEl.appendChild(waveContainer);
                }
                if (data.stars && data.stars.length > 0) {
                    const starDot = document.createElement('span');
                    starDot.className = 'star-indicator';
                    starDot.textContent = '✦';
                    dayEl.appendChild(starDot);
                }

                dayEl.addEventListener('click', (function(ds) {
                    return function() {
                        if (!isFuture(ds)) { soundClick();
                            openDay(ds); } else alert('Этот день ещё не наступил 😊');
                    };
                })(dateStr));
                grid.appendChild(dayEl);
            }
        }

        // =================================================================
        // 6. ФОНОВЫЙ ХОЛСТ И ЭФФЕКТЫ
        // =================================================================
        let bgCanvas, bgCtx;
        let bgAnimId = null;
        let currentMood = 0;
        let rainDrops = [],
            rainDrops2 = [],
            glassDrops = [],
            clouds = [],
            flowers = [],
            flareParticles = [];
        let lightningFlash = 0;

        function initBgCanvas() {
            bgCanvas = document.getElementById('bgCanvas');
            if (!bgCanvas) return;
            bgCtx = bgCanvas.getContext('2d');
            resizeBgCanvas();
            window.addEventListener('resize', resizeBgCanvas);
        }

        function resizeBgCanvas() {
            if (!bgCanvas) return;
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }

        function generateRain(dropsArray, count, angle, speed, lengthRange, width) {
            for (let i = 0; i < count; i++) {
                dropsArray.push({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * bgCanvas.height,
                    speed: speed * (0.8 + Math.random() * 0.4),
                    length: lengthRange[0] + Math.random() * (lengthRange[1] - lengthRange[0]),
                    width: width || 1.5,
                    angle: angle,
                    opacity: 0.4 + Math.random() * 0.4,
                });
            }
        }

        function updateRain(dropsArray) {
            for (let drop of dropsArray) {
                drop.x += Math.sin(drop.angle) * drop.speed;
                drop.y += Math.cos(drop.angle) * drop.speed;
                if (drop.y > bgCanvas.height) {
                    drop.y = -10;
                    drop.x = Math.random() * bgCanvas.width;
                }
                if (drop.x < -10) drop.x = bgCanvas.width + 10;
                if (drop.x > bgCanvas.width + 10) drop.x = -10;
            }
        }

        function drawRain(dropsArray, color) {
            bgCtx.save();
            for (let drop of dropsArray) {
                bgCtx.beginPath();
                bgCtx.moveTo(drop.x, drop.y);
                bgCtx.lineTo(drop.x + Math.sin(drop.angle) * drop.length, drop.y + Math.cos(drop.angle) * drop.length);
                bgCtx.strokeStyle = color || 'rgba(180,200,255,0.6)';
                bgCtx.lineWidth = drop.width;
                bgCtx.globalAlpha = drop.opacity;
                bgCtx.stroke();
            }
            bgCtx.restore();
        }

        function generateGlassDrops(count) {
            for (let i = 0; i < count; i++) {
                glassDrops.push({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * bgCanvas.height,
                    radius: 3 + Math.random() * 8,
                    speed: 0.2 + Math.random() * 0.5,
                    opacity: 0.3 + Math.random() * 0.3,
                });
            }
        }

        function updateGlassDrops() {
            for (let drop of glassDrops) {
                drop.y += drop.speed;
                if (drop.y > bgCanvas.height) {
                    drop.y = -10;
                    drop.x = Math.random() * bgCanvas.width;
                    drop.radius = 3 + Math.random() * 8;
                }
            }
        }

        function drawGlassDrops() {
            for (let drop of glassDrops) {
                const grad = bgCtx.createRadialGradient(drop.x, drop.y, 0, drop.x, drop.y, drop.radius);
                grad.addColorStop(0, 'rgba(255,255,255,0.5)');
                grad.addColorStop(0.5, 'rgba(200,220,255,0.2)');
                grad.addColorStop(1, 'rgba(200,220,255,0)');
                bgCtx.beginPath();
                bgCtx.arc(drop.x, drop.y, drop.radius, 0, Math.PI * 2);
                bgCtx.fillStyle = grad;
                bgCtx.fill();
                bgCtx.beginPath();
                bgCtx.arc(drop.x - drop.radius * 0.3, drop.y - drop.radius * 0.3, drop.radius * 0.2, 0, Math.PI * 2);
                bgCtx.fillStyle = 'rgba(255,255,255,0.6)';
                bgCtx.fill();
            }
        }

        function generateClouds(count) {
            for (let i = 0; i < count; i++) {
                clouds.push({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * bgCanvas.height * 0.8,
                    w: 100 + Math.random() * 200,
                    h: 40 + Math.random() * 60,
                    speed: 0.2 + Math.random() * 0.3,
                    opacity: 0.5 + Math.random() * 0.3,
                });
            }
        }

        function updateClouds() {
            for (let cloud of clouds) {
                cloud.x += cloud.speed;
                if (cloud.x > bgCanvas.width + cloud.w) cloud.x = -cloud.w;
            }
        }

        function drawClouds() {
            for (let cloud of clouds) {
                bgCtx.save();
                bgCtx.globalAlpha = cloud.opacity;
                const gradient = bgCtx.createRadialGradient(cloud.x, cloud.y, 0, cloud.x, cloud.y, cloud.w);
                gradient.addColorStop(0, 'rgba(255,255,255,0.8)');
                gradient.addColorStop(0.7, 'rgba(255,255,255,0.3)');
                gradient.addColorStop(1, 'rgba(255,255,255,0)');
                bgCtx.beginPath();
                bgCtx.ellipse(cloud.x, cloud.y, cloud.w, cloud.h, 0, 0, Math.PI * 2);
                bgCtx.fillStyle = gradient;
                bgCtx.fill();
                bgCtx.restore();
            }
        }

        function generateFlowers(count) {
            for (let i = 0; i < count; i++) {
                flowers.push({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * bgCanvas.height,
                    size: 25 + Math.random() * 45,
                    angle: Math.random() * Math.PI * 2,
                    petalCount: 5 + Math.floor(Math.random() * 3),
                    speed: 0.001 + Math.random() * 0.003,
                    rotationSpeed: (Math.random() - 0.5) * 0.002,
                });
            }
        }

        function drawFlowers(time) {
            for (let flower of flowers) {
                const size = flower.size;
                bgCtx.save();
                bgCtx.translate(flower.x, flower.y);
                bgCtx.rotate(flower.angle + time * flower.rotationSpeed);
                const petalCount = flower.petalCount;
                for (let i = 0; i < petalCount; i++) {
                    const angle = (i / petalCount) * Math.PI * 2 + time * flower.speed;
                    bgCtx.save();
                    bgCtx.rotate(angle);
                    bgCtx.beginPath();
                    bgCtx.ellipse(size * 0.25, 0, size * 0.25, size * 0.55, 0, 0, Math.PI * 2);
                    const grad = bgCtx.createRadialGradient(0, 0, 0, 0, 0, size * 0.55);
                    const colors = [
                        ['#ff8a9a', '#d84a6a', '#8a2a4a'],
                        ['#ff6a8a', '#d44a6a', '#8a2a4a'],
                        ['#ff9aaa', '#e05a7a', '#9a2a5a']
                    ];
                    const palette = colors[i % colors.length];
                    grad.addColorStop(0, palette[0]);
                    grad.addColorStop(0.5, palette[1]);
                    grad.addColorStop(1, palette[2]);
                    bgCtx.fillStyle = grad;
                    bgCtx.fill();
                    bgCtx.restore();
                }
                bgCtx.beginPath();
                bgCtx.arc(0, 0, size * 0.08, 0, Math.PI * 2);
                const centerGrad = bgCtx.createRadialGradient(0, 0, 0, 0, 0, size * 0.08);
                centerGrad.addColorStop(0, '#ffd700');
                centerGrad.addColorStop(1, '#ff8a00');
                bgCtx.fillStyle = centerGrad;
                bgCtx.fill();
                bgCtx.restore();
            }
        }

        function generateFlareParticles(count) {
            for (let i = 0; i < count; i++) {
                flareParticles.push({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * bgCanvas.height,
                    radius: 50 + Math.random() * 150,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: 0.1 + Math.random() * 0.2,
                    color: `hsla(${200 + Math.random()*60}, 80%, 70%, 0.3)`,
                });
            }
        }

        function updateFlareParticles() {
            for (let p of flareParticles) {
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < -p.radius) p.x = bgCanvas.width + p.radius;
                if (p.x > bgCanvas.width + p.radius) p.x = -p.radius;
                if (p.y < -p.radius) p.y = bgCanvas.height + p.radius;
                if (p.y > bgCanvas.height + p.radius) p.y = -p.radius;
            }
        }

        function drawFlareParticles() {
            for (let p of flareParticles) {
                const grad = bgCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
                grad.addColorStop(0, p.color);
                grad.addColorStop(1, 'transparent');
                bgCtx.beginPath();
                bgCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                bgCtx.fillStyle = grad;
                bgCtx.fill();
            }
        }

        function renderBg(time) {
            if (!bgCtx) return;
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

            if (currentMood === 0) {
                bgCtx.fillStyle = '#0a0a12';
                bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                return;
            }

            switch (currentMood) {
                case 1:
                    bgCtx.fillStyle = '#0a0a1a';
                    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                    updateRain(rainDrops);
                    drawRain(rainDrops, 'rgba(180,200,255,0.5)');
                    updateGlassDrops();
                    drawGlassDrops();
                    if (Math.random() < 0.0005) lightningFlash = 0.8;
                    if (lightningFlash > 0) {
                        bgCtx.fillStyle = `rgba(200,220,255,${lightningFlash * 0.3})`;
                        bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                        lightningFlash *= 0.98;
                    }
                    break;
                case 2:
                    bgCtx.fillStyle = '#1a2a3a';
                    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                    updateRain(rainDrops2);
                    drawRain(rainDrops2, 'rgba(200,220,255,0.3)');
                    updateGlassDrops();
                    drawGlassDrops();
                    break;
                case 3:
                    bgCtx.fillStyle = '#f5e6b0';
                    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                    updateClouds();
                    drawClouds();
                    break;
                case 4:
                    bgCtx.fillStyle = '#8a3a5a';
                    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                    drawFlowers(time);
                    break;
                case 5:
                    bgCtx.fillStyle = '#8ac4d4';
                    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                    const grad = bgCtx.createConicGradient(0, bgCanvas.width / 2, bgCanvas.height * 0.8);
                    grad.addColorStop(0, 'rgba(255,0,0,0.1)');
                    grad.addColorStop(0.17, 'rgba(255,165,0,0.1)');
                    grad.addColorStop(0.33, 'rgba(255,255,0,0.1)');
                    grad.addColorStop(0.5, 'rgba(0,255,0,0.1)');
                    grad.addColorStop(0.67, 'rgba(0,0,255,0.1)');
                    grad.addColorStop(0.83, 'rgba(75,0,130,0.1)');
                    grad.addColorStop(1, 'rgba(238,130,238,0.1)');
                    bgCtx.beginPath();
                    bgCtx.arc(bgCanvas.width / 2, bgCanvas.height * 0.8, Math.min(bgCanvas.width, bgCanvas.height) * 0.6, 0,
                        Math.PI);
                    bgCtx.fillStyle = grad;
                    bgCtx.fill();
                    break;
            }

            if (currentMood !== 0) {
                updateFlareParticles();
                drawFlareParticles();
            }
        }

        function setMoodEffect(mood) {
            if (bgAnimId) {
                cancelAnimationFrame(bgAnimId);
                bgAnimId = null;
            }
            // Останавливаем старый звук
            stopBgSound();

            currentMood = mood;
            const bgCanvasEl = document.getElementById('bgCanvas');

            if (mood === 0) {
                // Возвращаем фон в нейтральное состояние
                bgCanvasEl.style.opacity = '1';
                if (bgCtx) {
                    bgCtx.fillStyle = '#0a0a12';
                    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                }
                return;
            }

            // Запускаем новый звук
            startBgSound(mood);

            // Очищаем массивы и генерируем новые эффекты
            rainDrops = [];
            rainDrops2 = [];
            glassDrops = [];
            clouds = [];
            flowers = [];
            flareParticles = [];
            lightningFlash = 0;

            switch (mood) {
                case 1:
                    generateRain(rainDrops, 180, 0.2, 8, [15, 30], 1.5);
                    generateGlassDrops(15);
                    generateFlareParticles(10);
                    break;
                case 2:
                    generateRain(rainDrops2, 100, 0.4, 6, [12, 25], 1.2);
                    generateGlassDrops(8);
                    generateFlareParticles(8);
                    break;
                case 3:
                    generateClouds(6);
                    generateFlareParticles(6);
                    break;
                case 4:
                    generateFlowers(15);
                    generateFlareParticles(12);
                    break;
                case 5:
                    generateFlareParticles(25);
                    break;
            }

            function animateBg(time) {
                renderBg(time);
                bgAnimId = requestAnimationFrame(animateBg);
            }
            bgAnimId = requestAnimationFrame(animateBg);
        }

        // =================================================================
        // 7. ОТКРЫТЬ ДЕНЬ
        // =================================================================
        function openDay(dateStr) {
            currentDateStr = dateStr;
            const data = getDayData(dateStr);
            selectedStates = data.states ? [...data.states] : [];
            stars = data.stars ? [...data.stars] : [];
            selectedMood = data.mood || 0;

            const container = document.getElementById('waveContainer');
            container.classList.add('active');

            const parts = dateStr.split('-');
            const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября',
                'ноября', 'декабря'
            ];
            document.getElementById('waveDate').textContent = `${parts[2]} ${months[parts[1]-1]} ${parts[0]}`;

            // Показываем описания состояний (за волнами)
            const descContainer = document.getElementById('stateDescriptions');
            descContainer.innerHTML = '';
            STATES.forEach(st => {
                const item = document.createElement('div');
                item.className = 'state-item';
                item.innerHTML =
                    `<span class="state-symbol">${st.label.split(' ')[0]}</span> ${st.label} <span class="state-desc">${st.desc}</span>`;
                descContainer.appendChild(item);
            });
            descContainer.classList.add('active');

            // Сброс состояний волн
            waveStates = {};
            STATES.forEach(st => {
                waveStates[st.id] = {
                    currentAmp: 0,
                    targetAmp: 0,
                    currentAlpha: 0,
                    targetAlpha: 0,
                    offset: (Math.random() - 0.5) * 120
                };
            });

            if (selectedMood > 0) {
                setMoodEffect(selectedMood);
                // После подтверждения звук затухает, но не исчезает полностью
                fadeBgSound(0.02, 1.0);
                document.getElementById('moodSelector').classList.remove('active');
                document.getElementById('backBtn').classList.add('visible');
                document.getElementById('bottomPanel').classList.add('active');
                document.getElementById('noteInput').value = data.note || '';
                buildStatePanel();
                updateStarCounter();
                selectedStates.forEach(stId => setWaveTarget(stId, true));
            } else {
                document.getElementById('moodSelector').classList.add('active');
                document.getElementById('bottomPanel').classList.remove('active');
                document.getElementById('backBtn').classList.remove('visible');
                document.getElementById('noteInput').value = data.note || '';
                document.querySelectorAll('.mood-select-btn').forEach(b => b.classList.remove('selected'));
                document.getElementById('moodConfirmBtn').disabled = true;
                setMoodEffect(0);
                descContainer.classList.remove('active');
            }

            canvas = document.getElementById('waveCanvas');
            if (!canvas) {
                console.error('waveCanvas not found');
                return;
            }
            ctx = canvas.getContext('2d');
            resizeCanvas();
            if (animationId) cancelAnimationFrame(animationId);
            animateWaves();

            try { if (window.Telegram && Telegram.WebApp) Telegram.WebApp.expand(); } catch (e) {}
        }

        function buildStatePanel() {
            const panel = document.getElementById('statePanel');
            panel.innerHTML = '';
            STATES.forEach(st => {
                const btn = document.createElement('button');
                btn.className = 'state-btn';
                btn.dataset.state = st.id;
                btn.textContent = st.label;
                btn.style.color = st.color;
                if (selectedStates.includes(st.id)) btn.classList.add('selected');
                btn.addEventListener('click', function() {
                    soundClick();
                    toggleState(st.id, this);
                    // Обновляем отображение описаний в центре
                    updateSelectedStatesDisplay();
                });
                panel.appendChild(btn);
            });
        }

        // Отображение выбранных состояний в центре (под волнами)
        function updateSelectedStatesDisplay() {
            const descContainer = document.getElementById('stateDescriptions');
            descContainer.innerHTML = '';
            if (selectedStates.length === 0) {
                // Показываем все состояния по умолчанию
                STATES.forEach(st => {
                    const item = document.createElement('div');
                    item.className = 'state-item';
                    item.innerHTML =
                        `<span class="state-symbol">${st.label.split(' ')[0]}</span> ${st.label} <span class="state-desc">${st.desc}</span>`;
                    descContainer.appendChild(item);
                });
            } else {
                selectedStates.forEach(id => {
                    const st = STATES.find(s => s.id === id);
                    if (st) {
                        const item = document.createElement('div');
                        item.className = 'state-item selected-state';
                        item.innerHTML =
                            `<span class="state-symbol">${st.label.split(' ')[0]}</span> ${st.label} <span class="state-desc">${st.desc}</span>`;
                        descContainer.appendChild(item);
                    }
                });
            }
            descContainer.classList.add('active');
        }

        // =================================================================
        // 8. ВЫБОР ОЦЕНКИ
        // =================================================================
        document.querySelectorAll('.mood-select-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                soundClick();
                selectedMood = parseInt(this.dataset.mood);
                document.querySelectorAll('.mood-select-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('moodConfirmBtn').disabled = false;
                setMoodEffect(selectedMood);
            });
        });

        document.getElementById('moodConfirmBtn').addEventListener('click', function() {
            if (selectedMood === 0) return;
            soundConfirm();
            if (currentDateStr) {
                const data = getDayData(currentDateStr);
                data.mood = selectedMood;
                saveData();
                renderCalendar();
                // Плавно затухаем звук, но не до нуля
                fadeBgSound(0.02, 1.0);
                showAdditions();
            }
        });

        function showAdditions() {
            document.getElementById('moodSelector').classList.remove('active');
            document.getElementById('backBtn').classList.add('visible');
            buildStatePanel();
            document.getElementById('bottomPanel').classList.add('active');
            updateStarCounter();
            selectedStates.forEach(stId => setWaveTarget(stId, true));
            updateSelectedStatesDisplay();
        }

        function goBackToMood() {
            soundClick();
            document.getElementById('bottomPanel').classList.remove('active');
            document.getElementById('backBtn').classList.remove('visible');
            document.getElementById('moodSelector').classList.add('active');
            setMoodEffect(0);
            document.getElementById('stateDescriptions').classList.remove('active');
            document.querySelectorAll('.mood-select-btn').forEach(b => b.classList.toggle('selected', parseInt(b
                .dataset.mood) === selectedMood));
            document.getElementById('moodConfirmBtn').disabled = selectedMood === 0;
            STATES.forEach(st => setWaveTarget(st.id, false));
        }
        document.getElementById('backBtn').addEventListener('click', goBackToMood);

        // =================================================================
        // 9. УПРАВЛЕНИЕ СОСТОЯНИЯМИ
        // =================================================================
        function toggleState(stateId, btn) {
            const index = selectedStates.indexOf(stateId);
            if (index > -1) {
                selectedStates.splice(index, 1);
                btn.classList.remove('selected');
                setWaveTarget(stateId, false);
            } else if (selectedStates.length < 4) {
                selectedStates.push(stateId);
                btn.classList.add('selected');
                setWaveTarget(stateId, true);
            } else {
                alert('Можно выбрать максимум 4 состояния ✨');
                return;
            }
            if (currentDateStr) {
                const data = getDayData(currentDateStr);
                data.states = [...selectedStates];
                saveData();
                renderCalendar();
                updateSelectedStatesDisplay();
            }
        }

        // =================================================================
        // 10. ВОЛНЫ
        // =================================================================
        function getWaveState(stateId) {
            if (!waveStates[stateId]) {
                waveStates[stateId] = {
                    currentAmp: 0,
                    targetAmp: 0,
                    currentAlpha: 0,
                    targetAlpha: 0,
                    offset: (Math.random() - 0.5) * 120
                };
            }
            return waveStates[stateId];
        }

        function setWaveTarget(stateId, active) {
            const state = getWaveState(stateId);
            if (active) {
                state.targetAmp = 35 + Math.random() * 10;
                state.targetAlpha = 0.7 + Math.random() * 0.2;
            } else {
                state.targetAmp = 0;
                state.targetAlpha = 0;
            }
        }

        function resizeCanvas() {
            if (!canvas) return;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        // =================================================================
        // 11. АНИМАЦИЯ ВОЛН
        // =================================================================
        function animateWaves() {
            if (!canvas || !ctx) return;
            const w = canvas.width,
                h = canvas.height,
                time = Date.now() / 1000;
            ctx.clearRect(0, 0, w, h);

            let hasActive = false;
            STATES.forEach((st, index) => {
                const state = waveStates[st.id];
                if (!state) return;
                state.currentAmp += (state.targetAmp - state.currentAmp) * 0.06;
                state.currentAlpha += (state.targetAlpha - state.currentAlpha) * 0.06;
                if (Math.abs(state.currentAmp - state.targetAmp) < 0.01) state.currentAmp = state.targetAmp;
                if (Math.abs(state.currentAlpha - state.targetAlpha) < 0.001) state.currentAlpha = state.targetAlpha;

                const amp = state.currentAmp;
                const alpha = state.currentAlpha;
                if (amp < 0.5 || alpha < 0.01) return;
                hasActive = true;

                const color = st.color;
                const offset = state.offset || 0;
                const centerY = h * 0.4;
                const freq = 0.014 + index * 0.003;
                const speed = 0.9 + index * 0.1;

                ctx.save();
                const glowSize = 80 + Math.sin(time * 0.5 + index) * 20;
                const grad = ctx.createRadialGradient(w / 2, centerY + offset, 0, w / 2, centerY + offset, glowSize);
                grad.addColorStop(0, st.color + '20');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                ctx.beginPath();
                ctx.moveTo(0, centerY + offset);
                for (let x = 0; x <= w; x += 2) {
                    const y = centerY + offset +
                        Math.sin(x * freq + time * speed + index * 1.2) * amp +
                        Math.sin(x * freq * 0.6 + time * 0.9 + index * 2.6) * amp * 0.5 +
                        Math.sin(x * freq * 2.0 + time * 2.2 + index * 0.6) * amp * 0.25;
                    ctx.lineTo(x, y);
                }
                ctx.strokeStyle = color;
                ctx.lineWidth = 4 + Math.sin(time * 0.3 + index) * 1.2;
                ctx.globalAlpha = alpha * (0.8 + Math.sin(time * 0.4 + index * 1.0) * 0.15);
                ctx.shadowBlur = 60;
                ctx.shadowColor = color;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, centerY + offset + 18 + Math.sin(time * 0.2 + index) * 10);
                for (let x = 0; x <= w; x += 3) {
                    const y = centerY + offset + 18 + Math.sin(time * 0.2 + index) * 10 +
                        Math.sin(x * freq * 0.7 + time * 1.0 + index * 1.9) * amp * 0.6 +
                        Math.sin(x * freq * 0.4 + time * 0.6 + index * 2.9) * amp * 0.3;
                    ctx.lineTo(x, y);
                }
                ctx.strokeStyle = color;
                ctx.lineWidth = 2.5;
                ctx.globalAlpha = alpha * 0.2;
                ctx.shadowBlur = 40;
                ctx.shadowColor = color;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, centerY + offset - 12 + Math.sin(time * 0.2 + index * 0.6) * 7);
                for (let x = 0; x <= w; x += 4) {
                    const y = centerY + offset - 12 + Math.sin(time * 0.2 + index * 0.6) * 7 +
                        Math.sin(x * freq * 0.5 + time * 0.6 + index * 1.6) * amp * 0.35 +
                        Math.sin(x * freq * 0.3 + time * 0.4 + index * 2.6) * amp * 0.12;
                    ctx.lineTo(x, y);
                }
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.5;
                ctx.globalAlpha = alpha * 0.08;
                ctx.shadowBlur = 25;
                ctx.shadowColor = color;
                ctx.stroke();
                ctx.restore();
            });

            if (!hasActive && selectedStates.length === 0) {
                ctx.fillStyle = 'rgba(255,255,255,0.04)';
                ctx.font = '16px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText('Выбери состояния ↓', w / 2, h * 0.4 - 10);
                ctx.fillStyle = 'rgba(255,255,255,0.02)';
                ctx.font = '13px system-ui';
                ctx.fillText('Нажми на кнопки внизу', w / 2, h * 0.4 + 24);
            }

            // ЗВЁЗДЫ (с углами)
            stars.forEach((star, idx) => {
                const time = Date.now() / 1000;
                const twinkle = 0.6 + Math.sin(time * 1.8 + idx * 2.3) * 0.4;
                const size = 14 + Math.sin(time * 1.2 + idx * 1.7) * 3;

                // Свечение
                const glowGrad = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, size * 14);
                glowGrad.addColorStop(0, `rgba(255,255,255,${0.25 * twinkle})`);
                glowGrad.addColorStop(0.2, `rgba(200,230,255,${0.15 * twinkle})`);
                glowGrad.addColorStop(0.5, `rgba(180,210,255,${0.05 * twinkle})`);
                glowGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = glowGrad;
                ctx.fillRect(star.x - size * 14, star.y - size * 14, size * 28, size * 28);

                // Рисуем звезду с 5 лучами
                ctx.save();
                ctx.translate(star.x, star.y);
                ctx.rotate(time * 0.02 + idx * 0.5);

                const spikes = 5;
                const outerRadius = size;
                const innerRadius = size * 0.4;
                ctx.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fillStyle = `rgba(255,255,255,${0.8 + 0.2 * twinkle})`;
                ctx.shadowBlur = 40;
                ctx.shadowColor = 'rgba(200,230,255,0.8)';
                ctx.fill();
                ctx.shadowBlur = 0;

                // Блик в центре
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.12, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${0.7 + 0.3 * twinkle})`;
                ctx.fill();

                ctx.restore();

                // Подпись звезды
                if (star.note) {
                    ctx.fillStyle = 'rgba(255,255,255,0.12)';
                    ctx.font = '11px system-ui';
                    ctx.textAlign = 'center';
                    const displayNote = star.note.length > 15 ? star.note.slice(0, 15) + '…' : star.note;
                    ctx.fillText(displayNote, star.x, star.y + size + 28);
                }
            });

            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            animationId = requestAnimationFrame(animateWaves);
        }

        // =================================================================
        // 12. ЗВЁЗДЫ — ДОБАВЛЕНИЕ
        // =================================================================
        function updateStarCounter() {
            document.getElementById('starCounter').textContent = `⭐ ${stars.length}`;
        }

        document.getElementById('starBtn').addEventListener('click', function() {
            if (!currentDateStr) return;
            if (stars.length >= MAX_STARS) {
                alert(`Можно добавить максимум ${MAX_STARS} звёзд ✨`);
                return;
            }
            const note = document.getElementById('noteInput').value.trim();
            if (!note) { alert('Напиши заметку для звезды ✨'); return; }
            // Звук битого стекла/хрусталя
            createGlassCrystalSound();
            const data = getDayData(currentDateStr);
            if (!data.stars) data.stars = [];
            const centerX = canvas.width / 2,
                centerY = canvas.height * 0.2;
            const x = centerX + (Math.random() - 0.5) * canvas.width * 0.6;
            const y = centerY + (Math.random() - 0.5) * canvas.height * 0.15;
            const newStar = { x, y, note, date: currentDateStr };
            data.stars.push(newStar);
            stars = data.stars;
            saveData();
            updateStarCounter();
            renderCalendar();
            createCrystalAppearance(x, y);
            document.getElementById('noteInput').value = '';
            data.note = '';
            saveData();
        });

        function createCrystalAppearance(x, y) {
            const flash = document.createElement('div');
            flash.style.cssText = `
                position: fixed; left: ${x-80}px; top: ${y-80}px;
                width: 160px; height: 160px; border-radius: 50%;
                background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(200,230,255,0.5) 30%, rgba(180,210,255,0.2) 60%, transparent 80%);
                pointer-events: none; z-index: 2000;
                transform: scale(0);
                animation: crystalFlash 0.8s ease-out forwards;
            `;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 900);

            for (let i = 0; i < 40; i++) {
                const spark = document.createElement('div');
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 140;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist;
                const size = 2 + Math.random() * 5;
                const hue = 190 + Math.random() * 40;
                const color = `hsl(${hue}, 80%, ${80 + Math.random() * 20}%)`;
                spark.style.cssText = `
                    position: fixed; left: ${x}px; top: ${y}px;
                    width: ${size}px; height: ${size}px;
                    border-radius: 50%;
                    background: ${color};
                    box-shadow: 0 0 15px ${color};
                    pointer-events: none; z-index: 2000;
                    transition: all 0.8s cubic-bezier(0.2, 0.9, 0.4, 1);
                    opacity: 1;
                    transform: scale(1);
                `;
                document.body.appendChild(spark);
                requestAnimationFrame(() => {
                    spark.style.transform = `translate(${dx}px, ${dy}px) scale(0)`;
                    spark.style.opacity = '0';
                });
                setTimeout(() => spark.remove(), 900);
            }
        }

        const styleFlash = document.createElement('style');
        styleFlash.textContent = `
            @keyframes crystalFlash {
                0% { transform: scale(0); opacity: 1; }
                50% { transform: scale(2.5); opacity: 0.8; }
                100% { transform: scale(4); opacity: 0; }
            }
        `;
        document.head.appendChild(styleFlash);

        // =================================================================
        // 13. ЗВЁЗДЫ — УДАЛЕНИЕ
        // =================================================================
        function deleteStar(star) {
            createGlassCrystalSound(); // звук битого стекла
            const numParticles = 60;
            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement('div');
                const angle = Math.random() * Math.PI * 2;
                const speed = 60 + Math.random() * 250;
                const dx = Math.cos(angle) * speed;
                const dy = Math.sin(angle) * speed;
                const size = 2 + Math.random() * 6;
                const hue = 190 + Math.random() * 40;
                const color = `hsl(${hue}, 80%, ${70 + Math.random() * 30}%)`;
                particle.style.cssText = `
                    position: fixed; left: ${star.x}px; top: ${star.y}px;
                    width: ${size}px; height: ${size}px;
                    border-radius: 50%;
                    background: ${color};
                    box-shadow: 0 0 15px ${color};
                    pointer-events: none; z-index: 2000;
                    transition: all 0.9s cubic-bezier(0.15, 0.9, 0.3, 1);
                    opacity: 1;
                    transform: scale(1);
                `;
                document.body.appendChild(particle);
                if (Math.random() > 0.5) {
                    particle.style.borderRadius = '2px';
                }
                requestAnimationFrame(() => {
                    particle.style.transform = `translate(${dx}px, ${dy}px) scale(0) rotate(${Math.random()*360}deg)`;
                    particle.style.opacity = '0';
                });
                setTimeout(() => particle.remove(), 1000);
            }

            const data = getDayData(currentDateStr);
            data.stars = data.stars.filter(s => s.x !== star.x || s.y !== star.y);
            stars = data.stars;
            saveData();
            updateStarCounter();
            renderCalendar();
            longPressTarget = null;
        }

        // =================================================================
        // 14. ДОЛГОЕ НАЖАТИЕ ДЛЯ УДАЛЕНИЯ ЗВЕЗДЫ
        // =================================================================
        let longPressTimer = null,
            longPressTarget = null;

        document.addEventListener('mousedown', function(e) {
            if (e.target.id !== 'waveCanvas') return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left,
                y = e.clientY - rect.top;
            let found = null;
            for (const star of stars) {
                if (Math.sqrt((star.x - x) ** 2 + (star.y - y) ** 2) < 45) { found = star; break; }
            }
            if (found) {
                longPressTarget = found;
                longPressTimer = setTimeout(() => deleteStar(found), 800);
            }
        });
        document.addEventListener('mouseup', function() {
            if (longPressTimer) { clearTimeout(longPressTimer);
                longPressTimer = null; }
            longPressTarget = null;
        });
        document.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left,
                y = touch.clientY - rect.top;
            let found = null;
            for (const star of stars) {
                if (Math.sqrt((star.x - x) ** 2 + (star.y - y) ** 2) < 45) { found = star; break; }
            }
            if (found) {
                longPressTarget = found;
                longPressTimer = setTimeout(() => deleteStar(found), 800);
            }
        });
        document.addEventListener('touchend', function() {
            if (longPressTimer) { clearTimeout(longPressTimer);
                longPressTimer = null; }
            longPressTarget = null;
        });

        // =================================================================
        // 15. РЕДАКТОР ЗАМЕТОК
        // =================================================================
        let editingTarget = null,
            editingType = null,
            editingStateId = null;

        document.addEventListener('click', function(e) {
            if (e.target.id !== 'waveCanvas') return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left,
                y = e.clientY - rect.top;

            let found = null;
            for (const star of stars) {
                if (Math.sqrt((star.x - x) ** 2 + (star.y - y) ** 2) < 45) { found = star; break; }
            }
            if (found) { openNoteEditor('star', found, null); return; }

            if (selectedStates.length > 0 && y > canvas.height * 0.25 && y < canvas.height * 0.55) {
                let closestState = null;
                let closestDist = Infinity;
                selectedStates.forEach((stateId) => {
                    const state = waveStates[stateId];
                    if (!state) return;
                    const waveY = canvas.height * 0.4 + (state.offset || 0);
                    const dist = Math.abs(y - waveY);
                    if (dist < closestDist) {
                        closestDist = dist;
                        closestState = stateId;
                    }
                });
                if (closestState && closestDist < 80) {
                    openNoteEditor('state', null, closestState);
                } else {
                    openNoteEditor('day', null, null);
                }
            }
        });

        function openNoteEditor(type, data, stateId) {
            const editor = document.getElementById('noteEditor');
            const textarea = document.getElementById('noteEditorTextarea');
            const title = document.getElementById('noteEditorTitle');
            const content = document.getElementById('noteEditorContent');
            editingType = type;
            editingTarget = data;
            editingStateId = stateId;
            content.style.removeProperty('--wave-color');
            content.style.removeProperty('--wave-glow');
            content.classList.remove('wave-color');
            if (type === 'star' && data) {
                title.textContent = '⭐ Особенный момент';
                textarea.value = data.note || '';
            } else if (type === 'state' && stateId) {
                const st = STATES.find(s => s.id === stateId);
                if (st) {
                    title.textContent = `🌊 ${st.label}`;
                    const data = getDayData(currentDateStr);
                    textarea.value = data.stateNotes?.[stateId] || '';
                    content.style.setProperty('--wave-color', st.color);
                    content.style.setProperty('--wave-glow', `${st.color}33`);
                    content.classList.add('wave-color');
                }
            } else if (type === 'day') {
                title.textContent = '📝 Комментарий ко дню';
                const dayData = getDayData(currentDateStr);
                textarea.value = dayData.note || '';
            }
            editor.classList.add('active');
            textarea.focus();
        }

        document.getElementById('noteEditorBack').addEventListener('click', function() {
            document.getElementById('noteEditor').classList.remove('active');
        });
        document.getElementById('noteEditorSave').addEventListener('click', function() {
            const textarea = document.getElementById('noteEditorTextarea');
            const value = textarea.value.trim();
            if (editingType === 'star' && editingTarget) {
                editingTarget.note = value;
                const data = getDayData(currentDateStr);
                const starIndex = data.stars.findIndex(s => s.x === editingTarget.x && s.y === editingTarget.y);
                if (starIndex !== -1) { data.stars[starIndex].note = value;
                    saveData(); }
                const localIndex = stars.findIndex(s => s.x === editingTarget.x && s.y === editingTarget.y);
                if (localIndex !== -1) { stars[localIndex].note = value; }
            } else if (editingType === 'state' && editingStateId) {
                const data = getDayData(currentDateStr);
                if (!data.stateNotes) data.stateNotes = {};
                data.stateNotes[editingStateId] = value;
                saveData();
            } else if (editingType === 'day') {
                const data = getDayData(currentDateStr);
                data.note = value;
                saveData();
                document.getElementById('noteInput').value = value;
            }
            document.getElementById('noteEditor').classList.remove('active');
            editingTarget = null;
            editingType = null;
            editingStateId = null;
        });

        // =================================================================
        // 16. СБРОС ДНЯ
        // =================================================================
        let resetPressTimer = null;

        document.getElementById('waveDate').addEventListener('mousedown', function() {
            resetPressTimer = setTimeout(() => {
                if (currentDateStr && !isResetInProgress) {
                    soundReset();
                    if (confirm('🗑️ Точно сбросить все данные за этот день?')) {
                        resetDay();
                    }
                }
                resetPressTimer = null;
            }, 1000);
        });
        document.getElementById('waveDate').addEventListener('mouseup', function() {
            if (resetPressTimer) { clearTimeout(resetPressTimer);
                resetPressTimer = null; }
        });
        document.getElementById('waveDate').addEventListener('mouseleave', function() {
            if (resetPressTimer) { clearTimeout(resetPressTimer);
                resetPressTimer = null; }
        });
        document.getElementById('waveDate').addEventListener('touchstart', function(e) {
            resetPressTimer = setTimeout(() => {
                if (currentDateStr && !isResetInProgress) {
                    soundReset();
                    if (confirm('🗑️ Точно сбросить все данные за этот день?')) {
                        resetDay();
                    }
                }
                resetPressTimer = null;
            }, 1000);
        });
        document.getElementById('waveDate').addEventListener('touchend', function() {
            if (resetPressTimer) { clearTimeout(resetPressTimer);
                resetPressTimer = null; }
        });

        function resetDay() {
            if (!currentDateStr) return;
            isResetInProgress = true;
            const fog = document.getElementById('fogOverlay');
            fog.classList.add('active');
            const data = getDayData(currentDateStr);
            data.mood = 0;
            data.states = [];
            data.stars = [];
            data.note = '';
            data.stateNotes = {};
            selectedStates = [];
            stars = [];
            selectedMood = 0;
            saveData();
            updateStarCounter();
            renderCalendar();
            STATES.forEach(st => {
                const state = waveStates[st.id];
                if (state) { state.currentAmp = 0;
                    state.targetAmp = 0;
                    state.currentAlpha = 0;
                    state.targetAlpha = 0; }
            });
            setTimeout(() => {
                fog.classList.remove('active');
                document.getElementById('bottomPanel').classList.remove('active');
                document.getElementById('backBtn').classList.remove('visible');
                const selector = document.getElementById('moodSelector');
                selector.classList.add('active');
                document.getElementById('moodConfirmBtn').disabled = true;
                document.querySelectorAll('.mood-select-btn').forEach(b => b.classList.remove('selected'));
                setMoodEffect(0);
                document.getElementById('stateDescriptions').classList.remove('active');
                const container = document.getElementById('waveContainer');
                container.style.background = 'transparent';
                container.style.boxShadow = 'none';
                isResetInProgress = false;
            }, 1200);
        }

        // =================================================================
        // 17. ЗАКРЫТИЕ ХОЛСТА, НАВИГАЦИЯ
        // =================================================================
        document.getElementById('closeWaves').addEventListener('click', function() {
            const container = document.getElementById('waveContainer');
            container.classList.remove('active');
            document.getElementById('moodSelector').classList.remove('active');
            document.getElementById('bottomPanel').classList.remove('active');
            document.getElementById('backBtn').classList.remove('visible');
            if (animationId) cancelAnimationFrame(animationId);
            setMoodEffect(0);
            document.getElementById('stateDescriptions').classList.remove('active');
            renderCalendar();
        });

        document.getElementById('prevMonth').addEventListener('click', function() {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11;
                currentYear--; }
            renderCalendar();
        });
        document.getElementById('nextMonth').addEventListener('click', function() {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0;
                currentYear++; }
            renderCalendar();
        });

        // =================================================================
        // 18. ИНСТРУКЦИЯ
        // =================================================================
        document.getElementById('helpBtn').addEventListener('click', function() {
            document.getElementById('helpModal').classList.add('active');
        });
        document.getElementById('helpClose').addEventListener('click', function() {
            document.getElementById('helpModal').classList.remove('active');
        });
        document.getElementById('helpModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });

        // =================================================================
        // 19. ЗВУКИ КНОПОК
        // =================================================================
        function soundClick() { playTone(600, 0.06, 'sine', 0.03); }
        function soundConfirm() {
            playTone(800, 0.08, 'sine', 0.04);
            setTimeout(() => playTone(1000, 0.06, 'sine', 0.03), 100);
        }
        function soundReset() { playTone(300, 0.4, 'sawtooth', 0.03); }
        // Вспомогательная функция для звука кликов
        function playTone(freq, duration, type, volume) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(volume * 0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        // =================================================================
        // 20. ИНИЦИАЛИЗАЦИЯ
        // =================================================================
        loadData();
        renderCalendar();
        initBgCanvas();

        window.addEventListener('resize', function() {
            if (canvas) resizeCanvas();
            resizeBgCanvas();
        });

        // При загрузке показываем все состояния в центре
        updateSelectedStatesDisplay();

        try {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
            }
        } catch (e) {}

        console.log('🌌 Реалистичный дневник загружен!');
        console.log('💡 Для сброса дня зажми дату в центре вверху на 2 секунды.');
    </script>
</body>
</html>
