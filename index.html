<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хрустальный дневник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0b0a0f;
            color: #eae6f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: pan-y;
        }

        /* главный контейнер */
        .app {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 20% 20%, #1a1725, #08070b);
        }

        /* календарь — видим по умолчанию */
        .calendar-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 16px 20px;
            backdrop-filter: blur(2px);
            transition: opacity 0.35s ease, transform 0.35s ease;
            overflow-y: auto;
            max-height: 100vh;
        }
        .calendar-view.hidden {
            opacity: 0;
            transform: scale(0.96);
            pointer-events: none;
            position: absolute;
            width: 100%;
        }

        /* шапка календаря */
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .cal-header .month-year {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 16px 4px 12px;
            border-radius: 48px;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .month-year .avg-score {
            font-size: 0.9rem;
            opacity: 0.8;
            background: rgba(255, 215, 0, 0.12);
            padding: 2px 12px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .cal-nav {
            display: flex;
            gap: 10px;
        }
        .cal-nav button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #d0cce0;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 1.3rem;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            cursor: pointer;
        }
        .cal-nav button:active {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(0.92);
        }

        /* сетка дней */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6a6480;
            margin: 6px 0 8px;
            padding: 0 4px;
        }
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            padding: 0 2px;
        }
        .day-cell {
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 400;
            font-size: 0.95rem;
            background: rgba(30, 28, 40, 0.5);
            backdrop-filter: blur(2px);
            border: 1px solid transparent;
            transition: 0.15s;
            position: relative;
            min-height: 52px;
            color: #c8c2dc;
        }
        .day-cell.future {
            opacity: 0.3;
            pointer-events: none;
        }
        .day-cell.today {
            border-color: #6eb0ff;
            box-shadow: 0 0 14px rgba(90, 150, 255, 0.25);
        }
        .day-cell .mini-waves {
            display: flex;
            gap: 2px;
            margin-top: 2px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .day-cell .mini-waves span {
            width: 6px;
            height: 3px;
            border-radius: 4px;
            background: #6a6480;
        }
        .day-cell .star-badge {
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 0.6rem;
            color: #f5d742;
            text-shadow: 0 0 8px #f5b742;
        }
        .day-cell:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Холст (полноэкранный) */
        .canvas-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0f0d18;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 20;
            backdrop-filter: blur(0px);
        }
        .canvas-view.active {
            opacity: 1;
            pointer-events: auto;
        }

        .canvas-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scrollbar-width: thin;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: #bfb8d4;
            font-size: 1.2rem;
            padding: 10px 0 6px;
            text-align: left;
            cursor: pointer;
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding-left: 12px;
            width: fit-content;
        }
        .back-btn:active {
            background: rgba(255, 255, 255, 0.08);
        }

        .step-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: rgba(20, 18, 32, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px 18px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .step-title {
            font-size: 1.2rem;
            font-weight: 420;
            opacity: 0.8;
            margin-bottom: 6px;
        }

        .rating-buttons {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .rating-buttons button {
            flex: 1;
            min-width: 48px;
            height: 56px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            font-size: 1.4rem;
            font-weight: 500;
            color: #d4cee8;
            backdrop-filter: blur(4px);
            transition: 0.15s;
        }
        .rating-buttons button:active {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(0.92);
        }
        .rating-buttons button.selected {
            border-color: #9a8ec2;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 16px rgba(150, 130, 220, 0.15);
        }

        .states-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }
        .state-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 60px;
            padding: 12px 6px;
            text-align: center;
            font-size: 0.8rem;
            color: #cac4dd;
            backdrop-filter: blur(4px);
            transition: 0.12s;
            line-height: 1.2;
        }
        .state-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.06);
        }
        .state-btn .emoji {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 2px;
        }
        .state-btn.active {
            border-color: #9c8ec9;
            background: rgba(255, 255, 255, 0.06);
        }

        .star-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .star-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .star-btn {
            background: rgba(255, 215, 0, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.12);
            border-radius: 60px;
            padding: 12px 22px;
            font-size: 1rem;
            color: #f5e37a;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .star-btn:active {
            transform: scale(0.92);
            background: rgba(255, 215, 0, 0.12);
        }
        .star-btn .count {
            background: rgba(255, 215, 0, 0.15);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .note-input {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 14px 18px;
            width: 100%;
            color: #e0daf0;
            font-size: 0.95rem;
            resize: vertical;
            backdrop-filter: blur(4px);
        }
        .note-input::placeholder {
            color: #6a6480;
        }

        .confirm-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            padding: 14px;
            font-size: 1rem;
            color: #d0cae6;
            backdrop-filter: blur(4px);
            transition: 0.15s;
            margin-top: 6px;
        }
        .confirm-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.08);
        }

        /* волны на холсте (имитация) */
        .wave-container {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 6px 0;
        }
        .wave-tag {
            background: rgba(255, 255, 255, 0.02);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            border-left: 4px solid #6a6480;
        }
        .reset-zone {
            text-align: center;
            margin-top: 10px;
            font-size: 0.7rem;
            opacity: 0.3;
            letter-spacing: 1px;
        }
        .reset-zone:active {
            opacity: 0.8;
        }

        /* звезды на холсте */
        .star-display {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 6px 0;
        }
        .star-item {
            background: rgba(255, 215, 0, 0.06);
            border-radius: 60px;
            padding: 6px 16px 6px 12px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.15s;
        }
        .star-item:active {
            transform: scale(0.9);
        }
        .star-item .del {
            opacity: 0.4;
            font-size: 0.7rem;
            cursor: default;
        }
        .hidden {
            display: none !important;
        }

        /* всплывашка сброса */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(10, 8, 18, 0.85);
            backdrop-filter: blur(20px);
            padding: 18px 22px;
            border-radius: 60px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            z-index: 99;
            color: #d0cae6;
            font-size: 0.95rem;
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }
        .toast button {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: #d0cae6;
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 0.9rem;
        }
        .toast button:active {
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- КАЛЕНДАРЬ -->
    <div class="calendar-view" id="calendarView">
        <div class="cal-header">
            <div class="month-year" id="monthYear">
                <span id="monthLabel">Март 2026</span>
                <span class="avg-score" id="avgScore">✦ 0.0</span>
            </div>
            <div class="cal-nav">
                <button id="prevMonth">←</button>
                <button id="nextMonth">→</button>
            </div>
        </div>
        <div class="weekdays">
            <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
        </div>
        <div class="days-grid" id="daysGrid"></div>
    </div>

    <!-- ХОЛСТ (полноэкранный) -->
    <div class="canvas-view" id="canvasView">
        <div class="canvas-scroll">
            <button class="back-btn" id="closeCanvas">← Назад</button>
            <div class="step-container" id="stepRating">
                <div class="step-title">Оцените день (1–5)</div>
                <div class="rating-buttons" id="ratingButtons">
                    <button data-val="1">1</button><button data-val="2">2</button>
                    <button data-val="3">3</button><button data-val="4">4</button>
                    <button data-val="5">5</button>
                </div>
                <button class="confirm-btn" id="confirmRating">Подтвердить</button>
            </div>

            <div class="step-container hidden" id="stepStates">
                <div class="step-title">Состояния (до 4)</div>
                <div class="states-grid" id="statesGrid">
                    <div class="state-btn" data-state="Поток"><span class="emoji">🌊</span>Поток</div>
                    <div class="state-btn" data-state="Свет"><span class="emoji">☀️</span>Свет</div>
                    <div class="state-btn" data-state="Уют"><span class="emoji">🏠</span>Уют</div>
                    <div class="state-btn" data-state="Тень"><span class="emoji">🌙</span>Тень</div>
                    <div class="state-btn" data-state="Искра"><span class="emoji">⚡</span>Искра</div>
                    <div class="state-btn" data-state="Тишина"><span class="emoji">🌿</span>Тишина</div>
                    <div class="state-btn" data-state="Туман"><span class="emoji">🌫️</span>Туман</div>
                </div>
                <div class="wave-container" id="waveContainer"></div>
            </div>

            <div class="step-container hidden" id="stepNotes">
                <div class="step-title">Заметка</div>
                <textarea class="note-input" id="noteInput" placeholder="Что произошло сегодня?" rows="2"></textarea>
                <div class="star-section">
                    <div class="star-row">
                        <button class="star-btn" id="addStarBtn">⭐ Добавить звезду <span class="count" id="starCount">0</span></button>
                    </div>
                    <div class="star-display" id="starDisplay"></div>
                </div>
                <button class="confirm-btn" id="saveDayBtn">Сохранить день</button>
                <div class="reset-zone" id="resetDayZone">⏎ долгое нажатие для сброса</div>
            </div>
        </div>
    </div>

    <!-- тост -->
    <div class="toast hidden" id="toast"><span id="toastMsg"></span><button id="toastConfirm">Да</button><button id="toastCancel">Нет</button></div>
</div>

<script>
    (function(){
        // ---- state ----
        let currentDate = new Date();
        let currentYear = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth();
        let todayDate = currentDate.getDate();

        // данные в localStorage
        const STORAGE_KEY = 'crystal_diary_data';
        let diaryData = {};

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if(raw) diaryData = JSON.parse(raw);
                else diaryData = {};
            } catch(e){ diaryData = {}; }
        }
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(diaryData));
        }
        loadData();

        // ---- helper ----
        function getDayKey(year, month, day) {
            return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        }
        function getDayData(year, month, day) {
            const key = getDayKey(year, month, day);
            return diaryData[key] || null;
        }
        function setDayData(year, month, day, data) {
            const key = getDayKey(year, month, day);
            if(data) diaryData[key] = data;
            else delete diaryData[key];
            saveData();
        }

        // ---- рендер календаря ----
        function renderCalendar() {
            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';
            const firstDay = new Date(currentYear, currentMonth, 1);
            let startDay = firstDay.getDay(); // 0=вс
            startDay = (startDay === 0) ? 6 : startDay - 1; // пн=0
            const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
            const today = new Date();
            const todayY = today.getFullYear(), todayM = today.getMonth(), todayD = today.getDate();

            document.getElementById('monthLabel').innerText = new Date(currentYear, currentMonth).toLocaleString('ru', { month: 'long', year: 'numeric' });

            // средняя оценка
            let sum = 0, count = 0;
            for(let d=1; d<=daysInMonth; d++) {
                const data = getDayData(currentYear, currentMonth, d);
                if(data && data.rating) { sum += data.rating; count++; }
            }
            const avg = count ? (sum/count).toFixed(1) : '0.0';
            document.getElementById('avgScore').innerHTML = `✦ ${avg}`;

            for(let i=0; i<startDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell future';
                grid.appendChild(empty);
            }
            for(let d=1; d<=daysInMonth; d++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                const data = getDayData(currentYear, currentMonth, d);
                const isFuture = (currentYear > todayY) || (currentYear === todayY && currentMonth > todayM) || (currentYear === todayY && currentMonth === todayM && d > todayD);
                if(isFuture) cell.classList.add('future');
                if(currentYear === todayY && currentMonth === todayM && d === todayD) cell.classList.add('today');

                // цвет фона по оценке
                if(data && data.rating) {
                    const r = data.rating;
                    const brightness = 15 + (r-1)*20; // 1->15%, 5->95%
                    const bg = `hsl(0, 0%, ${brightness}%)`;
                    cell.style.background = bg;
                } else {
                    cell.style.background = 'rgba(30,28,40,0.4)';
                }

                cell.innerHTML = `<span>${d}</span>`;
                // мини-волны
                if(data && data.states && data.states.length) {
                    const waves = document.createElement('div');
                    waves.className = 'mini-waves';
                    data.states.forEach(s => {
                        const dot = document.createElement('span');
                        dot.style.background = getStateColor(s);
                        waves.appendChild(dot);
                    });
                    cell.appendChild(waves);
                }
                // звезда
                if(data && data.stars && data.stars.length > 0) {
                    const star = document.createElement('span');
                    star.className = 'star-badge';
                    star.innerText = '✦';
                    cell.appendChild(star);
                }
                cell.dataset.day = d;
                grid.appendChild(cell);
            }

            // клик по дню
            document.querySelectorAll('.day-cell:not(.future)').forEach(el => {
                el.addEventListener('click', (e) => {
                    const day = parseInt(el.dataset.day);
                    openDay(currentYear, currentMonth, day);
                });
            });
        }

        function getStateColor(state) {
            const map = {
                'Поток':'#4fc3f7','Свет':'#ffd54f','Уют':'#ffab91',
                'Тень':'#78909c','Искра':'#ff8a65','Тишина':'#aed581',
                'Туман':'#b0bec5'
            };
            return map[state] || '#6a6480';
        }

        // ---- открыть день ----
        let currentEditDay = null;
        let selectedRating = 0;
        let selectedStates = [];
        let stars = [];
        let noteText = '';

        function openDay(year, month, day) {
            currentEditDay = { year, month, day };
            const data = getDayData(year, month, day) || {};
            selectedRating = data.rating || 0;
            selectedStates = data.states ? [...data.states] : [];
            stars = data.stars ? [...data.stars] : [];
            noteText = data.note || '';

            document.getElementById('canvasView').classList.add('active');
            document.getElementById('calendarView').classList.add('hidden');

            // сброс UI
            document.getElementById('stepRating').classList.remove('hidden');
            document.getElementById('stepStates').classList.add('hidden');
            document.getElementById('stepNotes').classList.add('hidden');
            document.getElementById('confirmRating').style.display = 'block';

            // подсветка рейтинга
            document.querySelectorAll('#ratingButtons button').forEach(b => {
                b.classList.toggle('selected', parseInt(b.dataset.val) === selectedRating);
            });

            // состояния
            renderStates();
            renderWaves();
            renderStars();
            document.getElementById('noteInput').value = noteText || '';
            document.getElementById('starCount').innerText = stars.length;

            // если уже была оценка — переходим к состояниям
            if(selectedRating > 0) {
                document.getElementById('stepRating').classList.add('hidden');
                document.getElementById('stepStates').classList.remove('hidden');
                document.getElementById('stepNotes').classList.remove('hidden');
                document.getElementById('confirmRating').style.display = 'none';
            }
        }

        function renderStates() {
            document.querySelectorAll('#statesGrid .state-btn').forEach(el => {
                const st = el.dataset.state;
                el.classList.toggle('active', selectedStates.includes(st));
            });
        }
        function renderWaves() {
            const container = document.getElementById('waveContainer');
            container.innerHTML = '';
            selectedStates.forEach(s => {
                const tag = document.createElement('span');
                tag.className = 'wave-tag';
                tag.style.borderColor = getStateColor(s);
                tag.innerText = s;
                container.appendChild(tag);
            });
        }
        function renderStars() {
            const container = document.getElementById('starDisplay');
            container.innerHTML = '';
            stars.forEach((s, idx) => {
                const el = document.createElement('span');
                el.className = 'star-item';
                el.innerText = '✦ ' + (s.length > 12 ? s.slice(0,12)+'…' : s);
                el.dataset.idx = idx;
                // долгое нажатие удаления (имитация)
                let timer;
                el.addEventListener('pointerdown', () => {
                    timer = setTimeout(() => {
                        if(confirm('Удалить звезду?')) {
                            stars.splice(idx, 1);
                            renderStars();
                            document.getElementById('starCount').innerText = stars.length;
                        }
                    }, 800);
                });
                el.addEventListener('pointerup', () => clearTimeout(timer));
                el.addEventListener('pointerleave', () => clearTimeout(timer));
                // клик для редактирования заметки (звезды)
                el.addEventListener('click', () => {
                    const newText = prompt('Заметка для звезды:', s);
                    if(newText !== null) stars[idx] = newText.trim() || '✨';
                    renderStars();
                });
                container.appendChild(el);
            });
        }

        // ---- события ----
        document.querySelectorAll('#ratingButtons button').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedRating = parseInt(btn.dataset.val);
                document.querySelectorAll('#ratingButtons button').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });

        document.getElementById('confirmRating').addEventListener('click', () => {
            if(selectedRating < 1 || selectedRating > 5) {
                alert('Выберите оценку');
                return;
            }
            document.getElementById('stepRating').classList.add('hidden');
            document.getElementById('stepStates').classList.remove('hidden');
            document.getElementById('stepNotes').classList.remove('hidden');
            document.getElementById('confirmRating').style.display = 'none';
        });

        document.querySelectorAll('#statesGrid .state-btn').forEach(el => {
            el.addEventListener('click', () => {
                const st = el.dataset.state;
                const idx = selectedStates.indexOf(st);
                if(idx >= 0) {
                    selectedStates.splice(idx, 1);
                } else {
                    if(selectedStates.length >= 4) {
                        alert('Можно выбрать не более 4 состояний');
                        return;
                    }
                    selectedStates.push(st);
                }
                renderStates();
                renderWaves();
            });
        });

        document.getElementById('addStarBtn').addEventListener('click', () => {
            if(stars.length >= 7) {
                alert('Максимум 7 звёзд в день');
                return;
            }
            const text = prompt('Заметка для звезды (необязательно):', '');
            stars.push(text && text.trim() ? text.trim() : '✨');
            renderStars();
            document.getElementById('starCount').innerText = stars.length;
        });

        document.getElementById('saveDayBtn').addEventListener('click', () => {
            if(!currentEditDay) return;
            const { year, month, day } = currentEditDay;
            const note = document.getElementById('noteInput').value;
            const data = {
                rating: selectedRating,
                states: selectedStates,
                stars: stars,
                note: note
            };
            if(selectedRating === 0) {
                alert('Оцените день');
                return;
            }
            setDayData(year, month, day, data);
            closeCanvas();
            renderCalendar();
        });

        document.getElementById('closeCanvas').addEventListener('click', closeCanvas);

        function closeCanvas() {
            document.getElementById('canvasView').classList.remove('active');
            document.getElementById('calendarView').classList.remove('hidden');
            currentEditDay = null;
        }

        // сброс дня (долгое нажатие)
        let resetTimer = null;
        document.getElementById('resetDayZone').addEventListener('pointerdown', () => {
            resetTimer = setTimeout(() => {
                if(!currentEditDay) return;
                if(confirm('Точно сбросить все данные за этот день?')) {
                    const { year, month, day } = currentEditDay;
                    setDayData(year, month, day, null);
                    closeCanvas();
                    renderCalendar();
                }
            }, 1200);
        });
        document.getElementById('resetDayZone').addEventListener('pointerup', () => clearTimeout(resetTimer));
        document.getElementById('resetDayZone').addEventListener('pointerleave', () => clearTimeout(resetTimer));

        // навигация
        document.getElementById('prevMonth').addEventListener('click', () => {
            currentMonth--;
            if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        });
        document.getElementById('nextMonth').addEventListener('click', () => {
            currentMonth++;
            if(currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        });

        // инициализация
        renderCalendar();

        // телеграм экспанд
        if(window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.expand();
        }

        // аудио-имитация (заглушки)
        function playSound(type){ /* ничего не делаем, но концепт */ }

        // дополнительно: обработка звезд на холсте (редактирование)
    })();
</script>
</body>
</html>
